
# Backend CI for mirror repo - runs push-time smoke checks after monorepo sync
name: Backend CI

on:
  push:
    branches: [ main, dev ]

jobs:
  install-deps:
    name: backend:install-deps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

  phpunit:
    name: backend:phpunit
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run phpunit
        run: |
          if [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit
          else
            echo "phpunit binary not found; attempting global phpunit or composer test"
            composer test
          fi

  static-analysis:
    name: backend:static-analysis
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Try PHPStan (if available)
        run: |
          if [ -f vendor/bin/phpstan ]; then
            vendor/bin/phpstan analyse
          else
            echo "phpstan not installed; skipping static analysis"
          fi

